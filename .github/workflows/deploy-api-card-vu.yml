name: Deploy api.card.vu Laravel to public_html

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy-laravel:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Check repository contents
        run: |
          ls -la
          test -f artisan && echo "artisan found"
          test -f composer.json && echo "composer.json found"
          test -d public && echo "public folder found"

      - name: Prepare SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.HETZNER_SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p "${{ secrets.HETZNER_PORT }}" "${{ secrets.HETZNER_HOST }}" >> ~/.ssh/known_hosts

      - name: Test SSH connection
        run: |
          ssh -i ~/.ssh/id_ed25519 -p "${{ secrets.HETZNER_PORT }}" -o StrictHostKeyChecking=yes \
            "${{ secrets.HETZNER_USER }}@${{ secrets.HETZNER_HOST }}" "echo SSH_OK"

      - name: Ensure target folder exists
        run: |
          ssh -i ~/.ssh/id_ed25519 -p "${{ secrets.HETZNER_PORT }}" -o StrictHostKeyChecking=yes \
            "${{ secrets.HETZNER_USER }}@${{ secrets.HETZNER_HOST }}" \
            "mkdir -p /home/stechlocal/web/api.card.vu/public_html"

      - name: Clean target folder but keep runtime files
        run: |
          ssh -i ~/.ssh/id_ed25519 -p "${{ secrets.HETZNER_PORT }}" -o StrictHostKeyChecking=yes \
            "${{ secrets.HETZNER_USER }}@${{ secrets.HETZNER_HOST }}" \
            "find /home/stechlocal/web/api.card.vu/public_html -mindepth 1 -maxdepth 1 \
            ! -name '.env' \
            ! -name 'vendor' \
            ! -name 'storage' \
            ! -name '.well-known' \
            -exec rm -rf {} +"

      - name: Upload full Laravel project
        run: |
          tar -czf - . | ssh -i ~/.ssh/id_ed25519 -p "${{ secrets.HETZNER_PORT }}" -o StrictHostKeyChecking=yes \
            "${{ secrets.HETZNER_USER }}@${{ secrets.HETZNER_HOST }}" \
            "tar -xzf - -C /home/stechlocal/web/api.card.vu/public_html"

      - name: Set permissions
        run: |
          ssh -i ~/.ssh/id_ed25519 -p "${{ secrets.HETZNER_PORT }}" -o StrictHostKeyChecking=yes \
            "${{ secrets.HETZNER_USER }}@${{ secrets.HETZNER_HOST }}" \
            "chmod -R 775 /home/stechlocal/web/api.card.vu/public_html/storage /home/stechlocal/web/api.card.vu/public_html/bootstrap/cache || true"

      - name: Verify uploaded files
        run: |
          ssh -i ~/.ssh/id_ed25519 -p "${{ secrets.HETZNER_PORT }}" -o StrictHostKeyChecking=yes \
            "${{ secrets.HETZNER_USER }}@${{ secrets.HETZNER_HOST }}" \
            "ls -la /home/stechlocal/web/api.card.vu/public_html"
