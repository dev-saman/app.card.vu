name: Deploy api.card.vu Laravel to public_html

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy-laravel:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Prepare SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.HETZNER_SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p "${{ secrets.HETZNER_PORT }}" "${{ secrets.HETZNER_HOST }}" >> ~/.ssh/known_hosts

      - name: Get changed files
        id: changed_files
        run: |
          CHANGED=$(git diff --name-only HEAD~1 HEAD \
            | grep -v '^\.git' \
            | grep -v '^\.env' \
            | grep -v '^node_modules' \
            | grep -v '^vendor' \
            | grep -v '^storage')
          echo "Changed files:"
          echo "$CHANGED"
          if [ -z "$CHANGED" ]; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo "$CHANGED" > /tmp/changed_files.txt
          fi

      - name: Upload only changed files via rsync
        if: steps.changed_files.outputs.has_changes == 'true'
        run: |
          rsync -az \
            --compress \
            --itemize-changes \
            --files-from=/tmp/changed_files.txt \
            -e "ssh -i ~/.ssh/id_ed25519 -p ${{ secrets.HETZNER_PORT }} -o StrictHostKeyChecking=yes" \
            ./ ${{ secrets.HETZNER_USER }}@${{ secrets.HETZNER_HOST }}:/home/stechlocal/web/api.card.vu/public_html

      - name: Skip upload (no changes detected)
        if: steps.changed_files.outputs.has_changes == 'false'
        run: echo "No changed files detected. Skipping upload."

      - name: Optimize Laravel
        run: |
          ssh -i ~/.ssh/id_ed25519 -p "${{ secrets.HETZNER_PORT }}" \
          "${{ secrets.HETZNER_USER }}@${{ secrets.HETZNER_HOST }}" << 'EOF'
            cd /home/stechlocal/web/api.card.vu/public_html
            php artisan config:cache || true
            php artisan route:cache || true
            php artisan view:cache || true
          EOF
